name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        id: rust-cache
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install system dependencies
        if: steps.rust-cache.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y autoconf automake libtool rsync

      - name: Test
        run: cargo test --workspace --features ofi-libfabric-sys/vendored
